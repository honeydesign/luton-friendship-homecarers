<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle" (click)="toggleMobileMenu()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>

<aside class="sidebar" [class.mobile-open]="isMobileMenuOpen">
  <div class="sidebar-header">
    <div class="logo" style="display:flex; justify-content:center; padding: 0.5rem 0;">
      <img src="assets/FHC_Logo.png" alt="Luton Friendship Homecarers" class="sidebar-logo-img">
    </div>
  </div>

  <nav class="sidebar-nav">
    <button 
      class="nav-item" 
      [class.active]="currentPage === 'overview'"
      (click)="navigateTo('overview')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>Overview</span>
    </button>

    <button 
      class="nav-item" 
      [class.active]="currentPage === 'applications'"
      (click)="navigateTo('applications')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <polyline points="17 11 19 13 23 9"></polyline>
      </svg>
      <span>Applications</span>
    </button>

    <button 
      class="nav-item" 
      [class.active]="currentPage === 'jobs'"
      (click)="navigateTo('jobs')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
      </svg>
      <span>Manage Jobs</span>
    </button>

    <button 
      class="nav-item" 
      [class.active]="currentPage === 'inquiries'"
      (click)="navigateTo('inquiries')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>Contact Inquiries</span>
    </button>

    <button 
      class="nav-item" 
      [class.active]="currentPage === 'analytics'"
      (click)="navigateTo('analytics')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
      <span>Analytics</span>
    </button>

    <button 
      class="nav-item" 
      [class.active]="currentPage === 'settings'"
      (click)="navigateTo('settings')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v6m0 6v10M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h10m-17.36.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
      </svg>
      <span>Settings</span>
    </button>
    <button
      class="nav-item"
      [class.active]="currentPage === 'newsletter'"
      (click)="navigateTo('newsletter')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
      <span>Newsletter</span>
    </button>
  </nav>
</aside>
