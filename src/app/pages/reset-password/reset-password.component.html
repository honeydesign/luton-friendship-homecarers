<div class="login-container">
  <a routerLink="/admin/login" class="back-home-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Login</span>
  </a>

  <div class="login-brand">
    <div class="brand-content">
      <div class="brand-logo">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="6" fill="#2563EB"/>
          <path d="M16 8L8 14V24H14V18H18V24H24V14L16 8Z" fill="white"/>
        </svg>
        <div class="logo-text">
          <span class="logo-title">Luton Friendship</span>
          <span class="logo-subtitle">Homecarers Admin</span>
        </div>
      </div>
      <h1 class="brand-title">Set New Password</h1>
      <p class="brand-description">Choose a strong password for your account.</p>
    </div>
    <div class="brand-decoration">
      <div class="decoration-circle circle-1"></div>
      <div class="decoration-circle circle-2"></div>
      <div class="decoration-circle circle-3"></div>
    </div>
  </div>

  <div class="login-form-section">
    <div class="login-form-container">
      <div class="form-header">
        <h2 class="form-title">New Password</h2>
        <p class="form-subtitle">Enter and confirm your new password</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>{{ successMessage }} <a routerLink="/admin/login">Login now</a></span>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password"
              placeholder="Enter new password" class="form-input" required [disabled]="isLoading">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" name="confirmPassword" [(ngModel)]="confirmPassword"
              placeholder="Confirm new password" class="form-input" required [disabled]="isLoading">
          </div>
        </div>

        <button type="submit" class="submit-button" [disabled]="isLoading">
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading">Resetting...</span>
        </button>
      </form>
    </div>
  </div>
</div>
