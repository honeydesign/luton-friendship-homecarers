<div class="login-container">
  <a routerLink="/admin/login" class="back-home-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Back to Login</span>
  </a>

  <div class="login-brand">
    <div class="brand-content">
      <div class="brand-logo">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="6" fill="#2563EB"/>
          <path d="M16 8L8 14V24H14V18H18V24H24V14L16 8Z" fill="white"/>
        </svg>
        <div class="logo-text">
          <span class="logo-title">Luton Friendship</span>
          <span class="logo-subtitle">Homecarers Admin</span>
        </div>
      </div>
      <h1 class="brand-title">Forgot Password?</h1>
      <p class="brand-description">Enter your email and we'll send you a reset link.</p>
    </div>
    <div class="brand-decoration">
      <div class="decoration-circle circle-1"></div>
      <div class="decoration-circle circle-2"></div>
      <div class="decoration-circle circle-3"></div>
    </div>
  </div>

  <div class="login-form-section">
    <div class="login-form-container">
      <div class="form-header">
        <h2 class="form-title">Reset Password</h2>
        <p class="form-subtitle">We'll send a reset link to your email</p>
      </div>

      <div class="success-message" *ngIf="successMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" name="email" [(ngModel)]="email"
              placeholder="admin@lutonfhc.org.uk" class="form-input" required [disabled]="isLoading">
          </div>
        </div>

        <button type="submit" class="submit-button" [disabled]="isLoading">
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading">Sending...</span>
        </button>
      </form>
    </div>
  </div>
</div>
